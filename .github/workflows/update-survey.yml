name: Update Survey Data

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 (KST = UTC+9, so 01:00 UTC)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          GREETING_EMAIL: ${{ secrets.GREETING_EMAIL }}
          GREETING_PASSWORD: ${{ secrets.GREETING_PASSWORD }}
        run: node scripts/scrape-surveys.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/survey-raw.json
          git diff --cached --quiet || git commit -m "chore: 설문 데이터 자동 업데이트"
          git push
