name: Update Survey Data

on:
  workflow_dispatch:       # 수동 실행만 (자동 동기화는 Vercel cron에서 처리)

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          GREETING_EMAIL: ${{ secrets.GREETING_EMAIL }}
          GREETING_PASSWORD: ${{ secrets.GREETING_PASSWORD }}
          GREETING_PASSWORD_HASH: ${{ secrets.GREETING_PASSWORD_HASH }}
        run: node scripts/scrape-surveys.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/survey-raw.json
          git diff --cached --quiet || git commit -m "chore: 설문 데이터 자동 업데이트"
          git push
